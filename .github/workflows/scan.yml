# Smoke test: runs the mcpconform GitHub Action (uses: ./) on a CLEAN example to
# verify the action works end-to-end and emits valid SARIF. We lint a GOOD
# fixture (not the deliberately-broken ones) so this repo's own code-scanning
# stays clean — the consumer-facing "scan your MCP server" usage is documented
# in the README.
name: Action smoke test
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
  security-events: write
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: mcpconform
        uses: ./
        with:
          files: examples/tools.good.json
          targets: anthropic,openai
      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.mcpconform.outputs.sarif }}
          category: mcpconform
